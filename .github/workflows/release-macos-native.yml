name: Build macOS Native App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos-native:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v6

      - name: Set version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Fallback for workflow_dispatch without tag
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION=$(grep -o '"[0-9]*\.[0-9]*\.[0-9]*"' phantom/__init__.py | tr -d '"')
          fi
          DMG_NAME="Phantom-${VERSION}-beta.dmg"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$DMG_NAME" >> "$GITHUB_OUTPUT"
          echo "Building $DMG_NAME"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build universal binary
        run: |
          xcodebuild -project phantom-macos/Phantom.xcodeproj \
            -scheme Phantom \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            build

      - name: Locate .app
        id: locate
        run: |
          APP_PATH=$(find build -name "Phantom.app" -type d | head -1)
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Found app at: $APP_PATH"

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Phantom" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Phantom.app" 150 190 \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "${{ steps.version.outputs.dmg_name }}" \
            "${{ steps.locate.outputs.app_path }}" || true
          # create-dmg returns 2 on success when there's no background image
          ls -la "${{ steps.version.outputs.dmg_name }}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v6
        with:
          name: Phantom-macOS-native
          path: ${{ steps.version.outputs.dmg_name }}

