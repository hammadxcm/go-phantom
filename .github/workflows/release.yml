name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: phantom-macos-arm64
            pyinstaller_name: phantom
          - os: ubuntu-latest
            artifact: phantom-linux-x86_64
            pyinstaller_name: phantom
          - os: windows-latest
            artifact: phantom-windows.exe
            pyinstaller_name: phantom.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build binary
        run: pyinstaller build/phantom.spec --distpath dist/ --workpath build/tmp --clean

      - name: Rename artifact
        shell: bash
        run: mv dist/${{ matrix.pyinstaller_name }} dist/${{ matrix.artifact }} || true

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  build-deb:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build binary
        run: pyinstaller build/phantom.spec --distpath dist/ --workpath build/tmp --clean

      - name: Install fpm
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential
          sudo gem install fpm

      - name: Build .deb package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          fpm -s dir -t deb -n phantom -v "$VERSION" \
            --description "Cross-platform activity simulator" \
            --license MIT \
            --architecture amd64 \
            dist/phantom=/usr/local/bin/phantom

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v6
        with:
          name: phantom-deb
          path: '*.deb'

  release:
    needs: [build, build-deb]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/phantom-macos-arm64/phantom-macos-arm64
            artifacts/phantom-linux-x86_64/phantom-linux-x86_64
            artifacts/phantom-windows.exe/phantom-windows.exe
            artifacts/phantom-deb/*.deb

  # ─── Snap Store (Linux) ──────────────────────────────────────────────────────
  publish-snap:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download Linux binary
        uses: actions/download-artifact@v7
        with:
          name: phantom-linux-x86_64
          path: .

      - name: Build snap
        uses: snapcore/action-build@v1
        id: snap-build

      - name: Publish to Snap Store
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAP_STORE_LOGIN }}
        with:
          snap: ${{ steps.snap-build.outputs.snap }}
          release: stable

  # ─── Chocolatey (Windows) ────────────────────────────────────────────────────
  publish-choco:
    needs: [release]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download Windows binary
        uses: actions/download-artifact@v7
        with:
          name: phantom-windows.exe
          path: .

      - name: Compute SHA256 and update install script
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Path phantom-windows.exe -Algorithm SHA256).Hash
          $version = "${{ github.ref_name }}".TrimStart("v")

          # Update nuspec version
          $nuspec = Get-Content packaging/chocolatey/go-phantom.nuspec -Raw
          $nuspec = $nuspec -replace '<version>[^<]+</version>', "<version>$version</version>"
          Set-Content packaging/chocolatey/go-phantom.nuspec $nuspec

          # Update install script checksum
          $install = Get-Content packaging/chocolatey/tools/chocolateyInstall.ps1 -Raw
          $install = $install -replace "checksum\s*=\s*'[^']*'", "checksum      = '$hash'"
          Set-Content packaging/chocolatey/tools/chocolateyInstall.ps1 $install

      - name: Pack and push to Chocolatey
        shell: pwsh
        run: |
          cd packaging/chocolatey
          choco pack go-phantom.nuspec
          choco push (Get-ChildItem *.nupkg).Name --source https://push.chocolatey.org/ --api-key ${{ secrets.CHOCO_API_KEY }}

  # ─── WinGet (Windows) ───────────────────────────────────────────────────────
  publish-winget:
    needs: [release]
    runs-on: ubuntu-latest

    steps:
      - name: Publish to WinGet
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: hammadxcm.go-phantom
          installers-regex: phantom-windows\.exe$
          token: ${{ secrets.WINGET_TOKEN }}

  # ─── Scoop Bucket (Windows) ─────────────────────────────────────────────────
  publish-scoop:
    needs: [release]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download Windows binary
        uses: actions/download-artifact@v7
        with:
          name: phantom-windows.exe
          path: .

      - name: Update Scoop manifest and push to bucket
        env:
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          HASH=$(sha256sum phantom-windows.exe | cut -d' ' -f1)

          # Clone the bucket repo
          git clone "https://x-access-token:${SCOOP_BUCKET_TOKEN}@github.com/hammadxcm/scoop-phantom.git" bucket-repo
          mkdir -p bucket-repo/bucket

          # Generate updated manifest
          cat > bucket-repo/bucket/go-phantom.json << EOF
          {
              "version": "${VERSION}",
              "description": "Cross-platform activity simulator",
              "homepage": "https://github.com/hammadxcm/go-phantom",
              "license": "MIT",
              "architecture": {
                  "64bit": {
                      "url": "https://github.com/hammadxcm/go-phantom/releases/download/v${VERSION}/phantom-windows.exe",
                      "hash": "${HASH}"
                  }
              },
              "bin": [["phantom-windows.exe", "phantom"]],
              "checkver": "github",
              "autoupdate": {
                  "architecture": {
                      "64bit": {
                          "url": "https://github.com/hammadxcm/go-phantom/releases/download/v\$version/phantom-windows.exe"
                      }
                  }
              }
          }
          EOF

          # Commit and push
          cd bucket-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/go-phantom.json
          git commit -m "Update go-phantom to v${VERSION}" || echo "No changes"
          git push
