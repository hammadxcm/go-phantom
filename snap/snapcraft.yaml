name: go-phantom
base: core22
version: '0.0.3'
title: Phantom
icon: assets/icon-256.png
summary: Cross-platform activity simulator
description: |
  Phantom keeps your computer looking busy with realistic mouse movements,
  keyboard activity, scrolling, app switching, and browser tab cycling.
  Stealth mode, system tray, TUI dashboard, global hotkeys, fully configurable.
license: MIT
contact: https://github.com/hammadxcm/go-phantom/issues
issues: https://github.com/hammadxcm/go-phantom/issues
source-code: https://github.com/hammadxcm/go-phantom
website: https://github.com/hammadxcm/go-phantom

grade: stable
confinement: strict

architectures:
  - build-on: amd64

apps:
  phantom:
    command: bin/phantom
    plugs:
      - x11
      - desktop
      - desktop-legacy
      - unity7
      - home

parts:
  phantom:
    plugin: dump
    source: .
    organize:
      phantom-linux-x86_64: bin/phantom
    stage:
      - bin/phantom
    override-prime: |
      snapcraftctl prime
      chmod +x bin/phantom
